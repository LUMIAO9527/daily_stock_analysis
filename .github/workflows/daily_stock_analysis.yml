name: 每日股票分析

on:
  schedule:
    # 工作日 18:00（北京时间）执行
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      force_run:
        description: '是否强制运行（跳过交易日检查）'
        required: false
        default: 'false'

jobs:
  daily-analysis:
    runs-on: ubuntu-latest
    
    steps:
      # 最新版本 - 支持 Node.js 24
      - name: 📥 克隆代码仓库
        uses: actions/checkout@v4.1.1
        with:
          fetch-depth: 0

      - name: 🐍 配置 Python 环境
        uses: actions/setup-python@v5.0.1
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 安装项目依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧹 清理孤立进程
        run: |
          pkill -f "python main.py" || true
          sleep 2

      - name: 📊 运行股票分析
        env:
          # AI 模型配置
          AIHUBMIX_KEY: ${{ secrets.AIHUBMIX_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_VISION_MODEL: ${{ secrets.OPENAI_VISION_MODEL }}
          
          # 推送渠道配置
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_MESSAGE_THREAD_ID: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
          EMAIL_SENDER_NAME: ${{ secrets.EMAIL_SENDER_NAME }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_TOPIC: ${{ secrets.PUSHPLUS_TOPIC }}
          SERVERCHAN3_SENDKEY: ${{ secrets.SERVERCHAN3_SENDKEY }}
          CUSTOM_WEBHOOK_URLS: ${{ secrets.CUSTOM_WEBHOOK_URLS }}
          CUSTOM_WEBHOOK_BEARER_TOKEN: ${{ secrets.CUSTOM_WEBHOOK_BEARER_TOKEN }}
          
          # 数据和配置
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          MINIMAX_API_KEYS: ${{ secrets.MINIMAX_API_KEYS }}
          SERPAPI_API_KEYS: ${{ secrets.SERPAPI_API_KEYS }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          BRAVE_API_KEYS: ${{ secrets.BRAVE_API_KEYS }}
          SEARXNG_BASE_URLS: ${{ secrets.SEARXNG_BASE_URLS }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          
          # 行为控制
          TRADING_DAY_CHECK_ENABLED: 'true'
          PREFETCH_REALTIME_QUOTES: 'true'
          ENABLE_FUNDAMENTAL_PIPELINE: 'true'
          AGENT_MODE: 'false'
          
          # 报告配置
          REPORT_TYPE: 'full'
          SINGLE_STOCK_NOTIFY: 'false'
          MERGE_EMAIL_NOTIFICATION: 'false'
          
        run: |
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            python main.py --force-run
          else
            python main.py
          fi

      - name: 📤 保存分析报告
        uses: actions/upload-artifact@v4.3.1
        if: always()
        with:
          name: stock-analysis-report
          path: |
            logs/
            output/
          retention-days: 30

      - name: ✅ 完成通知
        if: success()
        run: |
          echo "✅ 股票分析完成"
          echo "时间: $(date '+%Y-%m-%d %H:%M:%S')"

      - name: ❌ 失败通知
        if: failure()
        run: |
          echo "❌ 股票分析失败，请检查日志"
          exit 1
